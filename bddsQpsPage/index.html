<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BDDS Performance Statistics - BlueCat Gateway</title>
<style>
  @font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 300;
    src: url('fonts/a4933e7a22e115be5a67.woff2') format('woff2'),
         url('fonts/1856a170cff4f04b9a91.woff') format('woff');
  }
  @font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 400;
    src: url('fonts/0a69e1398f51230ddf80.woff2') format('woff2'),
         url('fonts/3d8deabfbb86f3802d73.woff') format('woff');
  }
  @font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 600;
    src: url('fonts/391803a1576f3c5289b2.woff2') format('woff2'),
         url('fonts/c0ed32a3ea09e1328768.woff') format('woff');
  }

  :root {
    color-scheme: light;
    --series-1: #2a78d6; /* categorical slot 1 - blue */
    --series-2: #1baf7a; /* categorical slot 2 - aqua */
    --text-primary: #161616;
    --text-secondary: #525252;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --chart-surface: #fcfcfb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Open Sans', -apple-system, "Segoe UI", Arial, sans-serif;
    font-size: 14px;
    margin: 0;
    color: #161616;
    background: #f4f4f4;
  }

  /* Header: dark "inverse" surface, matches Gateway's UI shell regardless of page theme */
  #topbar {
    display: flex;
    align-items: center;
    height: 48px;
    padding: 0 8px;
    background: #0a1624;
    color: #fff;
    position: relative;
  }
  .topbar-btn {
    display: flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 12px; margin: 0 2px;
    border: none; background: transparent; color: #fff;
    font-family: inherit; font-size: 14px; cursor: pointer; border-radius: 2px;
  }
  .topbar-btn:hover { background: #1c2735; }
  .topbar-btn svg { width: 16px; height: 16px; flex: 0 0 auto; }
  #topbar .brand {
    position: absolute; left: 50%; top: 0; transform: translateX(-50%);
    display: flex; align-items: center; height: 48px;
    font-size: 15px; font-weight: 600; letter-spacing: .02em;
    color: #fff; pointer-events: none;
  }
  #topbar .right { display: flex; align-items: center; margin-left: auto; position: relative; }
  .topbar-menu {
    position: absolute; top: 48px; right: 0; z-index: 30;
    min-width: 210px; background: #fff; color: #161616;
    border: 1px solid #e0e0e0; box-shadow: 0 4px 12px rgba(0,0,0,.18);
    padding: 4px 0; display: none;
  }
  .topbar-menu.open { display: block; }
  .topbar-menu .menu-heading {
    padding: 8px 16px 4px; font-size: 11px; color: #6f6f6f;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .topbar-menu a {
    display: block; padding: 8px 16px; font-size: 14px;
    color: #161616; text-decoration: none; white-space: nowrap;
  }
  .topbar-menu a:hover { background: #e8e8e8; }
  .topbar-menu hr { border: none; border-top: 1px solid #e0e0e0; margin: 4px 0; }
  .topbar-menu .empty { padding: 8px 16px; font-size: 13px; color: #8d8d8d; }

  /* Breadcrumb: sits inside the content column, above the page title */
  #breadcrumb {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
    font-size: 12px; font-weight: 400; color: #161616;
  }
  #breadcrumb a { color: #00539a; text-decoration: none; }
  #breadcrumb a:hover { text-decoration: underline; }
  #breadcrumb .sep { color: #8d8d8d; }

  /* Layout: sidebar + content */
  #body { display: flex; min-height: calc(100vh - 48px); }
  #sidebar {
    width: 256px;
    flex: 0 0 256px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    padding: 8px 0;
    overflow-y: auto;
  }
  .nav-group-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; border: none; background: transparent; cursor: pointer;
    padding: 10px 16px 6px; font-size: 12px; font-weight: 600;
    color: #161616; text-transform: uppercase; letter-spacing: .03em;
  }
  .nav-group-btn .caret { transition: transform .15s ease-out; font-size: 10px; color: #6f6f6f; }
  .nav-group-btn[aria-expanded="false"] .caret { transform: rotate(-90deg); }
  .nav-group-children.collapsed { display: none; }
  #sidebar a {
    display: block;
    padding: 8px 16px;
    color: #161616;
    text-decoration: none;
    font-size: 14px;
  }
  #sidebar a:hover { background: #e8e8e8; }
  #sidebar a.active { background: #edf5ff; color: #00539a; font-weight: 600; border-left: 3px solid #0072c3; padding-left: 13px; }
  #sidebar .child a { padding-left: 32px; }
  #sidebar .child a.active { padding-left: 29px; }
  #sidebar .toplevel > a { font-weight: 600; }

  #content { flex: 1; padding: 24px 28px; }

  #pageHeader { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 400; margin: 0; }

  /* Two-panel layout: server picker on the left, results on the right */
  #panels { display: flex; align-items: stretch; gap: 16px; }
  .panel {
    background: #fff;
    border: 1px solid #e0e0e0;
    padding: 16px;
  }
  #pickerPanel { width: 320px; flex: 0 0 320px; display: flex; flex-direction: column; }
  #metricsPanel { width: 180px; flex: 0 0 180px; display: flex; flex-direction: column; }
  #resultsPanel { flex: 1; min-width: 0; }

  .metric-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13.5px; color: #161616; }
  #selectAllMetricsRow { padding-bottom: 8px; margin-bottom: 4px; border-bottom: 1px solid #e0e0e0; color: #525252; font-size: 13px; }

  /* Fixed to roughly 8 data rows tall; extra servers scroll instead of growing the panel */
  #serverListScroll { overflow-y: auto; max-height: 270px; }
  #pickerPanel thead th { position: sticky; top: 0; background: #fff; z-index: 1; }

  .field-label { font-size: 13px; color: #525252; margin-bottom: 6px; }
  select#configSelect {
    width: 100%; height: 36px; padding: 0 10px;
    border: 1px solid #8d8d8d; background: #fff; color: #161616;
    font-family: inherit; font-size: 14px; margin-bottom: 16px;
  }

  #selectAllRow {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; margin-bottom: 4px; border-bottom: 1px solid #e0e0e0;
    font-size: 13px; color: #525252;
  }

  table { border-collapse: collapse; width: 100%; background: #fff; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e0e0e0; }
  th { font-size: 13px; font-weight: 600; color: #525252; }
  #pickerPanel th, #pickerPanel td { padding: 6px 8px; font-size: 13.5px; }
  #pickerPanel th:first-child, #pickerPanel td:first-child { width: 36px; padding-right: 0; }
  td.num { text-align: left; font-variant-numeric: tabular-nums; }
  #rows tr.total-row td { font-weight: 600; border-top: 2px solid #8d8d8d; }
  input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }

  #footerRow {
    display: flex; align-items: center; justify-content: flex-end; gap: 12px;
    flex: none; font-size: 12px; color: #525252; white-space: nowrap;
  }
  #error { color: #da1e28; margin-bottom: 12px; display: none; }
  button.action { padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 13.5px; }

  /* History charts */
  #historyHeader { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; gap: 16px; }
  #historyChartsContainer { margin-top: 12px; }
  .history-panels-row { display: flex; align-items: stretch; gap: 16px; }
  .history-panels-row + .history-panels-row { margin-top: 16px; }
  .history-chart-panel { flex: 1; min-width: 0; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 16px; }

  /* API calls panel: raw PromQL requests this page issued against BAM's Prometheus,
     shown for transparency/debugging - collapsed by default since there can be many. */
  #apiCallsHeader { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; gap: 16px; }
  #apiCallsCount { font-size: 12px; color: var(--text-muted); }
  #apiCallsPanel { margin-top: 12px; }
  .api-call { border-bottom: 1px solid #e0e0e0; }
  .api-call:last-child { border-bottom: none; }
  .api-call summary {
    cursor: pointer; padding: 10px 4px; font-size: 13px; color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }
  .api-call summary .api-call-badge {
    flex: none; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 2px;
    color: #fff; background: var(--series-1);
  }
  .api-call.errored summary .api-call-badge { background: #da1e28; }
  .api-call summary .api-call-query {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; font-size: 12.5px;
    color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .api-call pre {
    margin: 0 4px 12px; padding: 10px 12px; background: #fafafa; border: 1px solid #e0e0e0;
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; font-size: 12px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
  }
  .api-call .api-call-url { font-size: 11.5px; color: var(--text-muted); margin: 0 4px 8px; word-break: break-all; }
  .chart-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .chart-legend { display: flex; gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
  .legend-key { width: 16px; height: 2px; border-radius: 1px; display: inline-block; flex: none; }
  .chart-wrap { position: relative; }

  /* Time range picker */
  .range-picker { position: relative; }
  .range-picker-btn {
    display: flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 12px; background: #fff; border: 1px solid #8d8d8d;
    font-family: inherit; font-size: 13px; color: #00539a; cursor: pointer;
  }
  .range-picker-btn .range-caret { width: 12px; height: 12px; flex: none; transition: transform .15s ease-out; }
  .range-picker-btn[aria-expanded="true"] .range-caret { transform: rotate(180deg); }
  .range-popover {
    position: absolute; top: 36px; right: 0; z-index: 20; min-width: 230px;
    background: #fff; border: 1px solid #e0e0e0; box-shadow: 0 4px 12px rgba(0,0,0,.15);
    padding: 12px; display: none;
  }
  .range-popover.open { display: block; }
  .range-presets { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
  .range-preset-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 4px;
    font-size: 13.5px; color: var(--text-primary); cursor: pointer; border-radius: 2px;
  }
  .range-preset-row:hover { background: #f4f4f4; }
  .range-preset-row input[type="radio"] { margin: 0; }
  .range-custom { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; border-top: 1px solid #e0e0e0; margin-bottom: 10px; }
  .range-field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-secondary); }
  .range-field input { height: 32px; padding: 0 8px; border: 1px solid #8d8d8d; font-family: inherit; font-size: 13px; }
  .range-field input.invalid { border-color: #da1e28; }
  .range-error { color: #da1e28; font-size: 12px; }
  .range-actions { display: flex; justify-content: flex-end; }
  /* Was `#historyChart` (a stale ID from before charts became dynamic - never matched the
     current per-chart `historyChart-<key>` IDs, so chart svgs had no real width/height rule). */
  .chart-wrap svg { width: 100%; height: 280px; display: block; overflow: visible; }
  /* Reserves a second, empty chart-row's worth of height even when only one row of charts
     is actually selected, so toggling metrics never shifts the API-calls panel below. */
  .history-chart-panel-ghost { visibility: hidden; }
  .chart-empty { color: var(--text-muted); font-size: 13px; padding: 40px 0; text-align: center; }
  .chart-tooltip {
    position: absolute; pointer-events: none; z-index: 5; display: none;
    background: #fff; border: 1px solid #e0e0e0; box-shadow: 0 4px 12px rgba(0,0,0,.12);
    border-radius: 2px; padding: 8px 10px; font-size: 12.5px; white-space: nowrap;
  }
  .chart-tooltip .tt-time { color: var(--text-muted); font-size: 11px; margin-bottom: 4px; }
  .chart-tooltip .tt-row { display: flex; align-items: center; gap: 6px; }
  .chart-tooltip .tt-row + .tt-row { margin-top: 3px; }
  .chart-tooltip .tt-key { width: 12px; height: 2px; display: inline-block; flex: none; }
  .chart-tooltip .tt-label { color: var(--text-secondary); }
  .chart-tooltip .tt-value { font-weight: 600; color: var(--text-primary); margin-left: auto; padding-left: 10px; }
</style>
</head>
<body>
  <div id="topbar">
    <a id="homeBtn" class="topbar-btn" href="/home">
      <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2 2 14h4v14h9V19h2v9h9V14h4z"/></svg>
      <span>Home</span>
    </a>
    <div class="brand"><img id="logo" alt="" style="height:18px;margin-right:8px;visibility:hidden;"> BLUECAT Gateway</div>
    <div class="right">
      <button class="topbar-btn" id="helpBtn" type="button">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 2a14 14 0 1 0 14 14A14 14 0 0 0 16 2zm0 25a11 11 0 1 1 11-11 11 11 0 0 1-11 11z"/><path d="M17 22h-2v2h2zM16.5 8h-1A4.5 4.5 0 0 0 11 12.5h2A2.5 2.5 0 0 1 15.5 10h1a2.5 2.5 0 0 1 0 5H15v3.5h2V17a4.5 4.5 0 0 0-.5-9z"/></svg>
        <span>Help</span>
      </button>
      <div class="topbar-menu" id="helpMenu"></div>

      <button class="topbar-btn" id="systemBtn" type="button">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M27 16.76v-1.52l2.83-2.35-2.87-4.97-3.55 1.04a11 11 0 0 0-2.63-1.52L20 3.34h-5.94l-.78 3.4a11.1 11.1 0 0 0-2.63 1.53L7.1 7.23 4.23 12.2l2.83 2.35v1.52L4.23 18.4l2.87 4.97 3.55-1.04a11 11 0 0 0 2.63 1.52l.78 3.4h5.94l.78-3.4a11.1 11.1 0 0 0 2.63-1.53l3.55 1.04 2.87-4.97zM17 21.5a5.5 5.5 0 1 1 5.5-5.5 5.5 5.5 0 0 1-5.5 5.5z"/></svg>
        <span>System</span>
      </button>
      <div class="topbar-menu" id="systemMenu"></div>

      <button class="topbar-btn" id="accountBtn" type="button">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 4a6 6 0 1 0 6 6 6 6 0 0 0-6-6zm10 24H6v-2a8 8 0 0 1 8-8h4a8 8 0 0 1 8 8z"/></svg>
        <span id="accountLabel">Account</span>
      </button>
      <div class="topbar-menu" id="accountMenu"></div>
    </div>
  </div>

  <div id="body">
    <nav id="sidebar"></nav>

    <main id="content">
      <div id="breadcrumb">
        <span class="sep">&#8249;</span>
        <a id="breadcrumbHome" href="/home">Home</a>
        <span class="sep">&middot;</span>
        <span>BDDS Performance Statistics</span>
      </div>
      <div id="pageHeader">
        <h1>BDDS Performance Statistics</h1>
        <div id="footerRow">
          <span>Last updated: <span id="lastUpdated">-</span> &middot; auto-refresh every 60s</span>
          <button class="action" id="refreshBtn">Refresh now</button>
        </div>
      </div>
      <div id="error"></div>

      <div id="panels">
        <section class="panel" id="pickerPanel">
          <div class="field-label">Select a configuration</div>
          <select id="configSelect"></select>

          <div class="field-label">Select BDDS Server</div>
          <div id="selectAllRow">
            <input type="checkbox" id="selectAll">
            <label for="selectAll">Select all BDDS</label>
          </div>
          <div id="serverListScroll">
            <table>
              <thead>
                <tr><th></th><th>Server</th><th>Address</th></tr>
              </thead>
              <tbody id="serverRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel" id="metricsPanel">
          <div class="field-label">Select metrics</div>
          <div id="selectAllMetricsRow" class="metric-row">
            <input type="checkbox" id="selectAllMetrics">
            <label for="selectAllMetrics">Select all</label>
          </div>
          <div id="metricCheckboxes"></div>
        </section>

        <section class="panel" id="resultsPanel">
          <table>
            <thead>
              <tr id="resultsHeaderRow"></tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </section>
      </div>

      <div id="historyHeader">
        <span class="chart-title">Performance history</span>
        <div class="range-picker">
          <button type="button" class="range-picker-btn" id="rangeBtn" aria-expanded="false">
            <span id="rangeLabel">Last hour</span>
            <svg class="range-caret" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          </button>
          <div class="range-popover" id="rangePopover">
            <div class="range-presets" id="rangePresets"></div>
            <div class="range-custom" id="rangeCustom" hidden>
              <label class="range-field">
                <span>From</span>
                <input type="datetime-local" id="rangeFrom">
                <span class="range-error" id="rangeFromError" hidden>From cannot be older than 2 weeks</span>
              </label>
              <label class="range-field">
                <span>To</span>
                <input type="datetime-local" id="rangeTo">
              </label>
            </div>
            <div class="range-actions">
              <button type="button" class="action" id="rangeApply">Apply</button>
            </div>
          </div>
        </div>
      </div>

      <div id="historyChartsContainer"></div>

      <div id="apiCallsHeader">
        <span class="chart-title">API calls to BAM's Prometheus</span>
        <span id="apiCallsCount"></span>
      </div>
      <section class="panel" id="apiCallsPanel">
        <div id="apiCallsList"></div>
      </section>
    </main>
  </div>

<script>
(function () {
  var CURRENT_PATH = window.location.pathname;

  function buildSidebar(navLinks) {
    var sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";
    var groupIndex = 0;

    navLinks.forEach(function (item) {
      if (item.children && item.children.length) {
        groupIndex += 1;
        var childrenId = "navgroup-" + groupIndex;

        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "nav-group-btn";
        btn.setAttribute("aria-expanded", "true");
        btn.setAttribute("aria-controls", childrenId);

        var label = document.createElement("span");
        label.textContent = item.title;
        var caret = document.createElement("span");
        caret.className = "caret";
        caret.textContent = "▾";
        btn.appendChild(label);
        btn.appendChild(caret);

        var childrenWrap = document.createElement("div");
        childrenWrap.className = "nav-group-children";
        childrenWrap.id = childrenId;

        item.children.forEach(function (child) {
          var wrap = document.createElement("div");
          wrap.className = "child";
          wrap.appendChild(makeLink(child));
          childrenWrap.appendChild(wrap);
        });

        btn.addEventListener("click", function () {
          var expanded = btn.getAttribute("aria-expanded") === "true";
          btn.setAttribute("aria-expanded", expanded ? "false" : "true");
          childrenWrap.classList.toggle("collapsed", expanded);
        });

        sidebar.appendChild(btn);
        sidebar.appendChild(childrenWrap);
      } else if (item.href) {
        var wrap = document.createElement("div");
        wrap.className = "toplevel";
        wrap.appendChild(makeLink(item));
        sidebar.appendChild(wrap);
      }
    });
  }

  function makeLink(item) {
    var a = document.createElement("a");
    a.href = item.href;
    a.textContent = item.title;
    if (item.href === CURRENT_PATH) {
      a.className = "active";
    }
    return a;
  }

  function populateMenu(el, entries) {
    el.innerHTML = "";
    if (!entries.length) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nothing here yet.";
      el.appendChild(empty);
      return;
    }
    entries.forEach(function (entry) {
      if (entry.divider) {
        el.appendChild(document.createElement("hr"));
        return;
      }
      if (entry.heading) {
        var h = document.createElement("div");
        h.className = "menu-heading";
        h.textContent = entry.heading;
        el.appendChild(h);
        return;
      }
      var a = document.createElement("a");
      a.href = entry.url;
      a.textContent = entry.text;
      if (/^https?:\/\//.test(entry.url)) a.target = "_blank";
      el.appendChild(a);
    });
  }

  function wireMenuButton(btnId, menuId) {
    var btn = document.getElementById(btnId);
    var menu = document.getElementById(menuId);
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      var willOpen = !menu.classList.contains("open");
      document.querySelectorAll(".topbar-menu.open").forEach(function (m) { m.classList.remove("open"); });
      if (willOpen) menu.classList.add("open");
    });
  }

  function loadChrome() {
    ["helpBtn", "systemBtn", "accountBtn"].forEach(function (id, i) {
      wireMenuButton(id, ["helpMenu", "systemMenu", "accountMenu"][i]);
    });
    document.addEventListener("click", function () {
      document.querySelectorAll(".topbar-menu.open").forEach(function (m) { m.classList.remove("open"); });
    });

    fetch("/-/v3/navbar/data", { credentials: "same-origin" })
      .then(function (resp) {
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return resp.json();
      })
      .then(function (data) {
        if (data.user) {
          var homeUrl = data.user.home_url || "/home";
          document.getElementById("homeBtn").href = homeUrl;
          document.getElementById("breadcrumbHome").href = homeUrl;
          document.getElementById("accountLabel").textContent = data.user.username || "Account";
          buildSidebar(data.user.nav_links || []);

          var helpEntries = [].concat(
            (data.user.help_links && data.user.help_links.platform) || [],
            (data.user.help_links && data.user.help_links.custom) || []

  function niceMax(value) {

    var base = Math.pow(10, exp);
    var fraction = value / base;
    var niceFraction = fraction <= 1 ? 1 : fraction <= 2 ? 2 : fraction <= 5 ? 5 : 10;
    return niceFraction * base;
  }

  function renderChart(rawSeries, ids, opts) {
    opts = opts || {};
    var formatValue = opts.formatValue || function (v) { return v.toFixed(2); };
    var formatAxis = opts.formatAxis || function (v) { return v.toFixed(v < 10 ? 1 : 0); };
    var svgNS = "http://www.w3.org/2000/svg";
    var svg = document.getElementById(ids.svg);
    var legend = document.getElementById(ids.legend);
    var tooltip = document.getElementById(ids.tooltip);
    var W = 960, H = 280;
    var padL = 40, padR = 12, padT = 12, padB = 24;
    var innerW = W - padL - padR;
    var innerH = H - padT - padB;

    svg.innerHTML = "";
    legend.innerHTML = "";
    tooltip.style.display = "none";

    var series = (rawSeries || []).filter(function (s) { return s.points && s.points.length; });

    if (!series.length) {
      var msg = document.createElementNS(svgNS, "text");
      msg.setAttribute("x", W / 2);
      msg.setAttribute("y", H / 2);
      msg.setAttribute("text-anchor", "middle");
      msg.setAttribute("fill", "#898781");
      msg.setAttribute("font-size", "13");
      msg.textContent = "No data for the selected time range.";
      svg.appendChild(msg);

    var allPoints = series.reduce(function (acc, s) { return acc.concat(s.points); }, []);
    var minT = Math.min.apply(null, allPoints.map(function (p) { return p.t; }));
    var maxT = Math.max.apply(null, allPoints.map(function (p) { return p.t; }));
    var maxV = Math.max.apply(null, allPoints.map(function (p) { return p.v; }).concat([1]));
    var yMax = opts.fixedMax != null ? opts.fixedMax : niceMax(maxV);

      line.setAttribute("y1", y); line.setAttribute("y2", y);

    var xTicks = 6;

      var idx = Math.round((refPoints.length - 1) * (j / xTicks));
      var p = refPoints[idx];

      var xlabel = document.createElementNS(svgNS, "text");
      xlabel.setAttribute("x", x); xlabel.setAttribute("y", H - 6);
      xlabel.setAttribute("text-anchor", j === xTicks ? "end" : j === 0 ? "start" : "middle");
      xlabel.setAttribute("font-size", "11"); xlabel.setAttribute("fill", "#898781");

      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", "2");
      path.setAttribute("stroke-linejoin", "round");
      path.setAttribute("stroke-linecap", "round");

      var item = document.createElement("div");
      item.className = "legend-item";
      var key = document.createElement("span");
      key.className = "legend-key";
      key.style.background = color;

        var key = document.createElement("span");

      var wrapWidth = svg.parentElement.getBoundingClientRect().width;
      var pxX = (x / W) * wrapWidth;
      tooltip.style.left = Math.min(pxX + 12, wrapWidth - 170) + "px";
      tooltip.style.top = "8px";
    });

    hitRect.addEventListener("pointerleave", function () {
      crosshair.setAttribute("visibility", "hidden");
      tooltip.style.display = "none";
    });
  }

  // Hit ratios and CPU/memory % are percentages: always scale the Y axis to a fixed
  // 0-100%, rather than the auto-scaled "nice" max used for rate-style metrics, and
  // format values with a "%" suffix.
  var PERCENT_CHART_OPTS = {
    fixedMax: 100,
    formatValue: function (v) { return v.toFixed(2) + "%"; },
    formatAxis: function (v) { return v.toFixed(0) + "%"; }
  };

  function isMetricChecked(key) {
    var cb = document.getElementById("metric-" + (METRIC_TO_GROUP_KEY[key] || key));
    return !cb || cb.checked;
  }

  // A group appears if any one of its constituent metrics is checked (e.g. checking just
  // "Disk Write IOPS" still shows the "Disk IOPS" chart, with only the Write lines on it).
  function selectedChartGroups() {
    return CHART_GROUPS
      .filter(function (g) { return g.metrics.some(isMetricChecked); })
      .slice(0, MAX_HISTORY_CHARTS);
  }

  function chartIdsFor(g) {
    return { svg: "historyChart-" + g.key, legend: "chartLegend-" + g.key, tooltip: "chartTooltip-" + g.key };
  }

  // Always reserves two rows once anything is selected (fills the first up to
  // MAX_CHARTS_PER_ROW, overflowing any remainder into the second, which may end up empty) -
  // so the section's total height stays constant at "2 rows" regardless of how many charts
  // are actually selected; only each row's chart widths flex to fit however many it holds.
  function chartRows(groups) {
    if (!groups.length) return [];
    return [groups.slice(0, MAX_CHARTS_PER_ROW), groups.slice(MAX_CHARTS_PER_ROW)];
  }

  function chartPanelHtml(g) {
    return (
      '<div class="chart-header">' +
        '<span class="chart-title">' + g.label + '</span>' +
        '<div class="chart-legend" id="chartLegend-' + g.key + '"></div>' +
      '</div>' +
      '<div class="chart-wrap">' +
        '<svg id="historyChart-' + g.key + '" viewBox="0 0 960 280" preserveAspectRatio="none"></svg>' +
        '<div class="chart-tooltip" id="chartTooltip-' + g.key + '"></div>' +
      '</div>'
    );
  }

  function buildHistoryCharts(groups) {
    var container = document.getElementById("historyChartsContainer");
    container.innerHTML = "";
    chartRows(groups).forEach(function (rowGroups) {
      var row = document.createElement("div");
      row.className = "history-panels-row";
      if (!rowGroups.length) {
        // Empty row: an invisible placeholder with the same markup as a real chart panel,
        // so it takes up the exact same height without an arbitrary hardcoded number.
        var ghost = document.createElement("section");
        ghost.className = "panel history-chart-panel history-chart-panel-ghost";
        ghost.innerHTML = chartPanelHtml({ key: "ghost", label: " " });
        row.appendChild(ghost);
      } else {
        rowGroups.forEach(function (g) {
          var section = document.createElement("section");
          section.className = "panel history-chart-panel";
          section.innerHTML = chartPanelHtml(g);
          row.appendChild(section);
        });
      }
      container.appendChild(row);
    });
  }

  // For a single-metric group, lines are just that metric's per-server series unchanged.
  // For a multi-metric group (disk/net), lines are per (server, checked metric), labeled
  // e.g. "bdds251a Read" so they're distinguishable when both metrics are checked at once.
  function chartLinesFor(group, series) {
    if (group.metrics.length === 1) {
      return series[group.metrics[0]] || [];
    }
    var lines = [];
    group.metrics.forEach(function (metricKey) {
      if (!isMetricChecked(metricKey)) return;
      var shortLabel = METRIC_SHORT_LABEL[metricKey] || metricKey;
      (series[metricKey] || []).forEach(function (s) {
        lines.push({
          exported_instance: s.exported_instance,
          label: s.exported_instance + " " + shortLabel,
          points: s.points,
        });
      });
    });
    return lines;
  }

  function renderHistoryCharts(series) {
    series = series || {};
    var groups = selectedChartGroups();
    buildHistoryCharts(groups);
    groups.forEach(function (g) {
      renderChart(chartLinesFor(g, series), chartIdsFor(g), g.percent ? PERCENT_CHART_OPTS : undefined);
    });
  }

  function loadHistory() {
    if (!selectedServers().length) {
      renderHistoryCharts({});
      return Promise.resolve();
    }

    var window = currentHistoryWindow();
    if (!window.start || !window.end) {
      renderHistoryCharts({});
      return Promise.resolve();
    }

    var params = metricParams();
    var configuration = currentConfiguration();
    if (configuration) params.push("configuration=" + encodeURIComponent(configuration));
    selectedServers().forEach(function (s) { params.push("server=" + encodeURIComponent(s)); });
    params.push("start=" + encodeURIComponent(window.start.toISOString()));
    params.push("end=" + encodeURIComponent(window.end.toISOString()));

    return fetchJSON(API_BASE + "/history?" + params.join("&"))
      .then(function (data) {
        renderHistoryCharts(data.series || {});
      })
      .catch(function () {
        // The charts are supplementary to the table above; a failed history fetch
        // shouldn't block the rest of the page.
      });
  }

  function renderApiCalls(calls) {
    var countEl = document.getElementById("apiCallsCount");
    var listEl = document.getElementById("apiCallsList");
    listEl.innerHTML = "";
    calls = calls || [];
    countEl.textContent = calls.length + (calls.length === 1 ? " call" : " calls");

    if (!calls.length) {
      var empty = document.createElement("div");
      empty.className = "chart-empty";
      empty.textContent = "No API calls for the current selection.";
      listEl.appendChild(empty);
      return;
    }

    calls.forEach(function (call, i) {
      var details = document.createElement("details");
      details.className = "api-call" + (call.error ? " errored" : "");

      var summary = document.createElement("summary");
      var badge = document.createElement("span");
      badge.className = "api-call-badge";
      badge.textContent = call.error ? "ERROR" : "OK";
      var query = document.createElement("span");
      query.className = "api-call-query";
      query.textContent = "#" + (i + 1) + "  " + (call.query || "(no query)");
      summary.appendChild(badge);
      summary.appendChild(query);
      details.appendChild(summary);

      var urlEl = document.createElement("div");
      urlEl.className = "api-call-url";
      urlEl.textContent = call.url;
      details.appendChild(urlEl);

      var pre = document.createElement("pre");
      pre.textContent = JSON.stringify(call.error ? { error: call.error } : call.response, null, 2);
      details.appendChild(pre);

      listEl.appendChild(details);
    });
  }

  function refresh() {
    if (!selectedServers().length) {
      showError(null);
      renderRows([]);
      renderApiCalls([]);
      document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();
      return Promise.resolve();
    }

    var params = metricParams();
    var configuration = currentConfiguration();
    if (configuration) params.push("configuration=" + encodeURIComponent(configuration));
    selectedServers().forEach(function (s) { params.push("server=" + encodeURIComponent(s)); });

    var url = API_BASE + "/current?" + params.join("&");

    return fetchJSON(url)
      .then(function (data) {
        showError(null);
        renderRows(data.servers || [], data.totals);
        renderApiCalls(data.api_calls);
        document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();
      })
      .catch(function (err) {
        showError("Failed to load statistics: " + err.message);
      });
  }

  wireSelectAll();
  buildMetricsPanel();
  wireSelectAllMetrics();
  wireRangePicker();
  document.getElementById("refreshBtn").addEventListener("click", function () {
    refresh();
    loadHistory();
  });

  // Render the (empty) table/charts immediately so they reflect the selected metrics even
  // if the config/server load below fails - it shouldn't leave either blank.
  renderRows([]);
  renderHistoryCharts({});

  loadConfigurations()
    .then(loadServers)
    .then(function () { refresh(); loadHistory(); })
    .catch(function (err) {
      showError("Failed to load BDDS server list: " + err.message);
    });

  setInterval(function () { refresh(); loadHistory(); }, REFRESH_MS);
})();
</script>
</body>
</html>
